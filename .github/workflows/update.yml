name: Update Catalog

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'queries/**'
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Checkout catalog-data
        uses: actions/checkout@v4
        with:
          path: catalog-data

      - name: Checkout main repo (for mirror-catalog-update script)
        uses: actions/checkout@v4
        with:
          repository: mirror-os/main
          path: mirror-os-main

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            flatpak \
            python3 \
            zstd \
            sqlite3

      - name: Add Flathub remote (system scope)
        run: |
          sudo flatpak remote-add --system --if-not-exists flathub \
            https://dl.flathub.org/repo/flathub.flatpakrepo

      - name: Download Flathub AppStream cache (XML + icon cache)
        run: |
          # Downloads appstream.xml.gz + icons/ for all Flathub apps.
          # No apps are installed; this just fetches the catalog metadata.
          sudo flatpak update --appstream --noninteractive 2>&1 | tail -5
          echo "AppStream cache size:"
          du -sh /var/lib/flatpak/appstream/flathub/x86_64/active/

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v14

      # Compute week number for nix-icon cache key (YYYY-WW).
      - name: Compute week number
        id: week
        run: echo "week=$(date -u '+%Y-%W')" >> "$GITHUB_OUTPUT"

      # Restore nix-icon incremental state across builds.
      # Includes nix-index-database (~92 MB) and state.json (which packages are done).
      - name: Restore nix-icon cache
        uses: actions/cache@v4
        with:
          path: /tmp/catalog-work/.local/share/mirror-os/media/.nix-icon-cache
          key: nix-icon-cache-${{ steps.week.outputs.week }}

      - name: Build catalog database
        run: |
          export HOME=/tmp/catalog-work
          mkdir -p "$HOME/.local/share/mirror-os"

          # Copy the update script from the main repo
          cp mirror-os-main/files/usr/libexec/mirror-os/mirror-catalog-update /tmp/mirror-catalog-update
          chmod +x /tmp/mirror-catalog-update

          # Build the full catalog (Flatpak + Nix + nix-meta + app_map).
          # --build: run full local build (not the download-from-release mode).
          # --no-media: skip Flatpak screenshot/icon downloads (icons come from
          #   AppStream cache + nix-icons.py instead).
          # hm-options is skipped automatically (no HM flake in CI).
          /tmp/mirror-catalog-update --build --source all --no-media

      - name: Extract Nix icons
        run: |
          nix profile install nixpkgs#nix-index
          python3 catalog-data/scripts/nix-icons.py \
            --db /tmp/catalog-work/.local/share/mirror-os/catalog.db \
            --media-dir /tmp/catalog-work/.local/share/mirror-os/media

      - name: Clear build-time icon paths
        run: |
          python3 - /tmp/catalog-work/.local/share/mirror-os/catalog.db << 'EOF'
          import sqlite3, sys
          conn = sqlite3.connect(sys.argv[1], timeout=30)
          with conn:
              conn.execute("UPDATE flatpak_apps SET icon_local_path = ''")
              try: conn.execute("UPDATE nix_packages SET icon_local_path = ''")
              except Exception: pass
          conn.close()
          EOF

      - name: Print catalog summary
        run: |
          python3 - /tmp/catalog-work/.local/share/mirror-os/catalog.db << 'EOF'
          import sqlite3, sys
          conn = sqlite3.connect(sys.argv[1])
          print("=== Catalog summary ===")
          for source, updated_at, row_count in conn.execute(
              "SELECT source, updated_at, row_count FROM catalog_meta ORDER BY source"
          ):
              print(f"  {source}: {row_count} rows (updated {updated_at})")
          for table, label in [("flatpak_apps", "Flatpak"), ("nix_packages", "Nix")]:
              try:
                  total = conn.execute(f"SELECT count(*) FROM {table}").fetchone()[0]
                  print(f"  {label} total: {total}")
              except Exception:
                  pass
          conn.close()
          EOF

      - name: Package artifacts
        run: |
          export HOME=/tmp/catalog-work
          MEDIA_DIR="$HOME/.local/share/mirror-os/media"
          CATALOG_DB="$HOME/.local/share/mirror-os/catalog.db"
          OUT=/tmp/artifacts
          mkdir -p "$OUT"

          cp "$CATALOG_DB" "$OUT/catalog.db"
          echo "catalog.db: $(du -sh "$OUT/catalog.db" | cut -f1)"

          # icons.tar.zst — Flatpak icons (from AppStream cache) + Nix icons (from NARs)
          if [ -d "$MEDIA_DIR/icons" ] && [ "$(ls -A "$MEDIA_DIR/icons" 2>/dev/null)" ]; then
            tar -C "$MEDIA_DIR" --zstd -cf "$OUT/icons.tar.zst" icons/
            echo "icons.tar.zst: $(du -sh "$OUT/icons.tar.zst" | cut -f1) ($(ls "$MEDIA_DIR/icons" | wc -l) icons)"
          else
            mkdir -p /tmp/empty-icons/icons
            tar -C /tmp/empty-icons --zstd -cf "$OUT/icons.tar.zst" icons/
            echo "icons.tar.zst: empty placeholder (no icons cached)"
          fi

          echo ""
          echo "=== Artifact sizes ==="
          ls -lh "$OUT/"

      - name: Commit catalog.db to repository
        run: |
          cp /tmp/artifacts/catalog.db catalog-data/catalog.db

          cd catalog-data
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add catalog.db
          if git diff --cached --quiet; then
            echo "No changes to catalog.db — skipping commit."
          else
            git commit -m "catalog: update $(date -u '+%Y-%m-%d')"
            git push
          fi

      - name: Delete old rolling release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd catalog-data
          gh release delete catalog-latest --yes 2>/dev/null || true
          git push origin :refs/tags/catalog-latest 2>/dev/null || true

      - name: Create rolling release (catalog-latest)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DATE=$(date -u '+%Y-%m-%d')
          cd catalog-data
          gh release create catalog-latest \
            --title "Catalog Data — latest (${DATE})" \
            --notes "$(cat <<'NOTES'
          Daily catalog snapshot.

          ## Artifacts

          | File | Description |
          |------|-------------|
          | `catalog.db` | SQLite catalog (Flatpak apps + Nix packages + app_map) |
          | `icons.tar.zst` | App icons (Flatpak + Nix) |

          Downloaded by `mirror-catalog-update` on user devices and by the Mirror OS image build.
          NOTES
          )" \
            --latest \
            /tmp/artifacts/catalog.db \
            /tmp/artifacts/icons.tar.zst

      - name: Create dated release for history
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DATE=$(date -u '+%Y-%m-%d')
          cd catalog-data
          gh release delete "catalog-${DATE}" --yes 2>/dev/null || true
          git push origin ":refs/tags/catalog-${DATE}" 2>/dev/null || true
          gh release create "catalog-${DATE}" \
            --title "Catalog Data — ${DATE}" \
            --notes "Daily snapshot ${DATE}." \
            /tmp/artifacts/catalog.db \
            /tmp/artifacts/icons.tar.zst
